<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>云顶官方PG试玩</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Helvetica Neue", sans-serif;
            background: linear-gradient(to right, #d99394, #1e3a8a);
            color: #fff;
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(to right, #0d31e1, #c2033f);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            margin-bottom: 20px;
        }

        header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        header .logo img {
            width: 30px;
            height: 30px;
        }

        header a {
            color: #facc15;
            text-decoration: none;
            font-weight: bold;
        }

        h1 {
            text-align: center;
            margin: 10px 0 10px;
            color: #facc15;
        }

        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .search-box input {
            padding: 8px;
            width: 300px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        .game-grid {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
            padding: 0 20px 100px;
            text-align: center;
        }

        /* 维护提示样式 */
        .maintenance-notice {
            background: rgba(45, 55, 72, 0.9);
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        .maintenance-notice h2 {
            color: #facc15;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .maintenance-notice p {
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .maintenance-notice .btn {
            display: inline-block;
            background: linear-gradient(to right, #a855f7, #6366f1);
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        .maintenance-notice .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
        }

        .bottom-tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background: linear-gradient(to right, #ede9fe, #f3e8ff);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #e5e7eb;
            z-index: 999;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }

        .tab-item .icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(145deg, #a855f7, #6366f1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tab-item .icon-wrapper img {
            width: 90%;
            height: 90%;
            padding: 7px;
            /* 缩小内部图标大小一致化 */
            object-fit: contain;
            box-sizing: border-box;
            display: block;
        }

        .tab-item.active .icon-wrapper {
            background: linear-gradient(145deg, #a855f7, #6366f1);
            /* ✅ 移除阴影效果 */
            box-shadow: none;
        }

        .tab-item.active .label {
            font-size: 13px;
            font-weight: bold;
            margin-top: 4px;
            color: #a855f7;
        }

        .rightbox {
            display: block;
            position: fixed;
            right: 50px;
            bottom: 50px;
            width: 60px;
            height: 60px;
            z-index: 999;
        }

        .leftbox,
        .rightbox img {
            border: 2px solid #fff;
            border-radius: 20%;
        }
    </style>

</head>
<div id="rightbox" class="rightbox">

    </div>
</div>

                   /* 新增：防止按钮被选中或遮挡 */

                   ">
                12年老牌集团，进入了解 ➤
            </button>
            <iframe id="gameIframe" style="width:100%; 
                   height:100%; 
                   border:none; 
                   border-radius:8px;
                   box-shadow:0 0 20px rgba(0,0,0,0.5);"></iframe>
        </div>
    </div>

    <script>

</body>

</html>
